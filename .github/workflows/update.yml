name: Atualizar BIORADAR

on:
  schedule:
    - cron: "0 6 * * *"   # todos os dias as 06:00 UTC
  workflow_dispatch:        # permite correr manualmente no botao do GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install yfinance pandas

      - name: Atualizar dados (incremental) e gerar site
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python run.py update fast
          python run.py site

      - name: Guardar BD atualizada no repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/agent.db
          git commit -m "Atualizacao automatica de dados" || echo "sem alteracoes"
          git push || echo "nada para enviar"

      - name: Publicar site no Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
